{% extends "base.html" %} {% load static %} {% block more_css %}
<link rel="stylesheet" href="{% static 'css/brand.css' %}" />
{% endblock %} {% block content %}

<main>
  <div class="container px-3">
    <div class="row justify-content-center">
      <div class="col-xl-12 col-lg-6 col-md-8">
        <div class="card form-card p-4 p-md-5">
          <h2 class="text-center section-title mb-2">Join as Brand</h2>
          <p class="text-center text-secondary mb-4">
            Create your brand account and start collaborating with top
            influencers.
          </p>

          <form>
            <div class="mb-3">
              <label class="form-label">Company Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Acme Corporation"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                placeholder="brand@email.com"
                required
              />
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contact Person</label>
              <input
                type="text"
                class="form-control"
                placeholder="Full Name"
                required
              />
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Phone Number</label>
                <input
                  type="tel"
                  class="form-control"
                  placeholder="+91 98765 43210"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Company Website</label>
                <input
                  type="url"
                  class="form-control"
                  placeholder="https://company.com"
                />
              </div>
            </div>

            <button type="submit" class="btn brand-btn w-100 mt-3">
              Create Account
            </button>

            <p class="text-center form-text mt-3">
              Already have an account?
              <span class="fw-semibold text-primary">Login</span>
            </p>
          </form>
          <a href="/" style="padding-left: 42%">Home</a>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
