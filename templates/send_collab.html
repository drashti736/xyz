{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Send Collaboration</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
            min-height: 100vh;
        }

        .collab-card {
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: none;
        }

        .form-select, .form-control {
            border-radius: 12px;
            padding: 10px 14px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #6366f1;
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="col-md-6 mt-5">
        <div class="card collab-card p-4">

            <div class="text-center">
                <div class="profile-avatar">
                    {{ influencer.username|first|upper }}
                </div>
                <h4 class="fw-bold">
                    Send Collaboration Request
                </h4>
                <p class="text-muted">
                    to <strong>{{ influencer.username }}</strong>
                </p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Select Campaign</label>
                    <select name="campaign" class="form-select" required>
                        <option value="">-- Select Campaign --</option>
                        {% for campaign in campaigns %}
                            <option value="{{ campaign.id }}">
                                {{ campaign.title }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Message</label>
                    <textarea name="message" rows="4" 
                        class="form-control" 
                        placeholder="Write your collaboration proposal..."></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-custom">
                        Send Collaboration Request
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
