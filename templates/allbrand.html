{% extends "base.html" %} {% load static %} {% block more_css %}
<link rel="stylesheet" href="{% static 'css/brand.css' %}" />
{% endblock %} {% block content %}

<main style="margin-top: 150px">
  <div class="container-fluid py-5">
    <h2 class="mb-4">All Brands</h2>

    <div class="row">

      {% if allbrands %} 
      {% for i in allbrands %}
      <div class="col-lg-3 col-md-4 col-md-6 my-2  brand-card">
        <div class="card shadow-sm h-100 text-center p-3" style="width : 18rem">
          <img src="{{i.brand_logo.url}}" height="100px">
          <h5 class="mt-3">{{ i.brand_name }}</h5>
          <p class="text-muted">{{ i.brand_founded_year }}</p>
          <a
            href="{% url 'view_brand' pk=i.pk %}"
            class="btn btn-outline-primary"
            target="_blank"
            >View Details</a
          >
        </div>
      </div>
      {% endfor %} 
      {% endif %}

    </div>
  </div>
</main>

{% block more_js %}

<script>
  // Function to get URL parameter
  function getUrlParameter(name) {
    name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
    var regex = new RegExp("[\\?&]" + name + "=([^&#]*)");
    var results = regex.exec(location.search);
    return results === null
      ? ""
      : decodeURIComponent(results[1].replace(/\+/g, " "));
  }

  // Filter brands based on URL parameter
  window.onload = function () {
    var brandId = getUrlParameter("id");
    if (brandId) {
      // Hide all brand cards
      var allCards = document.querySelectorAll(".brand-card");
      allCards.forEach(function (card) {
        card.style.display = "none";
      });
      // Show only the selected brand
      var selectedCard = document.getElementById(brandId);
      if (selectedCard) {
        selectedCard.style.display = "block";
        // Update title
        document.title =
          selectedCard.querySelector("h5").textContent + " | INFLUERA";
        document.querySelector("h2").textContent =
          selectedCard.querySelector("h5").textContent;
      }
    }
  };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %} {% endblock %}
